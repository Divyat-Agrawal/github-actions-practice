name: Python Lint

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.13"

            - name: install libraries and dependencies
              run: pipinstall -r requirements.txt

            - name: Run litter
              uses: flake8 app.py

              


